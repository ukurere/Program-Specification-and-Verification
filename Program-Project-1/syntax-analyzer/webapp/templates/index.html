<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>AST Visualizer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body{font-family:system-ui,Segoe UI,Arial;margin:24px;background:#0b0b0b;color:#ddd}
    .card{background:#141414;border:1px solid #2a2a2a;border-radius:16px;padding:16px;max-width:980px}
    input,button{font-size:16px;padding:10px 12px;border-radius:10px;border:1px solid #2a2a2a;background:#1b1b1b;color:#eee}
    button{cursor:pointer}
    #msg{margin-left:10px;color:#ff9999}
    svg{width:100%;height:560px;background:#0f0f0f;border:1px solid #2a2a2a;border-radius:12px}
    .node circle{fill:#222;stroke:#4d4d4d;stroke-width:1.5px}
    .node text{fill:#e9e9e9;font-size:14px}
    .link{fill:none;stroke:#444;stroke-width:1.5px}
  </style>
</head>
<body>
  <div class="card">
    <h2>Візуалізація AST (арифметичні вирази)</h2>
    <form id="f">
      <input id="expr" type="text" placeholder="(3+2)*4" size="40" required/>
      <button type="submit">Побудувати</button>
      <span id="msg"></span>
    </form>
    <div id="viz"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="{{ url_for('static', filename='ast_viz.js') }}"></script>
</body>
</html>
